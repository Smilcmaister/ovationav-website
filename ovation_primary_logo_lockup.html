<div style="padding: 1rem 0;">
<h2 class="sr-only">OVATION logo: the wordmark in bone-white uppercase, framed by two ember-orange corner brackets that lock around it, on an obsidian background, with the tagline "no second takes" beneath.</h2>

<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600&display=swap');
.ov-stage{position:relative;width:100%;border-radius:16px;background:#0A0A0C;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:88px 24px 72px;box-sizing:border-box;font-family:'Archivo',var(--font-sans);}
.ov-glow{position:absolute;top:34%;left:50%;width:560px;height:560px;transform:translate(-50%,-50%);background:radial-gradient(circle, rgba(242,106,27,0.20) 0%, rgba(242,106,27,0.07) 38%, rgba(10,10,12,0) 70%);pointer-events:none;}
.ov-flare{position:absolute;top:34%;left:50%;width:560px;height:560px;transform:translate(-50%,-50%);background:radial-gradient(circle, rgba(255,158,77,0.55) 0%, rgba(242,106,27,0) 55%);pointer-events:none;opacity:0;animation:ovFlare 2.4s ease-out 0.95s 1 forwards;}
.ov-lock{position:relative;display:inline-block;padding:30px 46px 32px;}
.ov-word{font-size:clamp(38px,8.4vw,76px);font-weight:500;letter-spacing:0.30em;color:#F4F1EC;line-height:1;text-indent:0.30em;opacity:0;animation:ovWord 0.9s cubic-bezier(.2,.7,.2,1) 0.15s 1 forwards;}
.ov-br{position:absolute;width:52px;height:52px;opacity:0;}
.ov-tl{top:0;left:0;border-top:2.5px solid #F26A1B;border-left:2.5px solid #F26A1B;animation:ovTL 0.85s cubic-bezier(.2,.8,.2,1) 0.55s 1 forwards;}
.ov-brc{bottom:0;right:0;border-bottom:2.5px solid #F26A1B;border-right:2.5px solid #F26A1B;animation:ovBR 0.85s cubic-bezier(.2,.8,.2,1) 0.55s 1 forwards;}
.ov-tag{margin-top:34px;font-size:13px;font-weight:500;letter-spacing:0.46em;color:#86837D;text-indent:0.46em;opacity:0;animation:ovTag 0.8s ease-out 1.25s 1 forwards;}
@keyframes ovWord{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes ovTL{from{opacity:0;transform:translate(-22px,-22px)}to{opacity:1;transform:translate(0,0)}}
@keyframes ovBR{from{opacity:0;transform:translate(22px,22px)}to{opacity:1;transform:translate(0,0)}}
@keyframes ovTag{to{opacity:1}}
@keyframes ovFlare{0%{opacity:0}45%{opacity:1}100%{opacity:0}}
@media (prefers-reduced-motion: reduce){.ov-word,.ov-br,.ov-tag{animation:none;opacity:1;transform:none}.ov-flare{animation:none;opacity:0}}
</style>

<div class="ov-stage">
  <div class="ov-glow"></div>
  <div class="ov-flare"></div>
  <div class="ov-lock">
    <span class="ov-br ov-tl"></span>
    <span class="ov-br ov-brc"></span>
    <div class="ov-word">OVATION</div>
  </div>
  <div class="ov-tag">NO SECOND TAKES</div>
</div>
</div>
